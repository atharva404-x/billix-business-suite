name: billix-app
region: sgp
services:
  - name: billix-backend
    github:
      branch: main
      deploy_on_push: true
      repo: atharva404-x/billix-business-suite
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 2
    instance_size_slug: basic-s
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 10
      response_timeout_seconds: 5
    envs:
      - key: ENV
        value: production
      - key: PROJECT_NAME
        value: Billix
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_PUBLISHABLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_JWKS_URL
        value: https://api.clerk.com/v1/.well-known/jwks.json
      - key: CLERK_API_URL
        value: https://api.clerk.com/v1
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
