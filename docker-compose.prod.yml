services:
  # --- Production FastAPI Backend Service ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: billix-backend-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - billix-prod-network

  # --- Production Nginx Frontend Service ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: runtime
    container_name: billix-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - billix-prod-network

  # --- Production PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: billix-postgres-prod
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-billix_prod}
      - POSTGRES_USER=${POSTGRES_USER:-billix_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billix_admin} -d ${POSTGRES_DB:-billix_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - billix-prod-network

  # --- Production Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: billix-redis-prod
    restart: always
    command: redis-server --save 60 1 --loglevel notice
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - billix-prod-network

networks:
  billix-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
