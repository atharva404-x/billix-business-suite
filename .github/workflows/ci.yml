name: Billix Continuous Integration (CI)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # 1. Backend Verification Job
  # ============================================================================
  backend-ci:
    name: Backend Tests & Alembic Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: billix_test
          POSTGRES_USER: billix
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt psycopg2-binary

      - name: Validate Alembic migrations integrity (PostgreSQL validation)
        env:
          DATABASE_URL: "postgresql+asyncpg://billix:password@localhost:5432/billix_test"
          ENV: "testing"
        run: |
          alembic upgrade head

      - name: Execute Backend unit test suite
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          ENV: "testing"
          CLERK_SECRET_KEY: "sk_test_mock_secret"
        run: |
          pytest -v --tb=short

  # ============================================================================
  # 2. Frontend Verification Job
  # ============================================================================
  frontend-ci:
    name: Frontend Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Build Frontend production bundle
        run: npm run build

  # ============================================================================
  # 3. Docker Build Verification Job
  # ============================================================================
  docker-ci:
    name: Docker Container Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: billix/backend:ci-test

      - name: Verify Frontend Docker Build (Dockerfile.frontend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: billix/frontend:ci-test
